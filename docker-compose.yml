services:
  db:
    image: postgres:16-alpine
    container_name: datashare-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  # TODO (hors MVP) : si NestJS tourne lui aussi dans un container Docker,
  # ajouter un volume pour uploads/ pour que les fichiers survivent aux redémarrages :
  #   uploads_data:
  # et dans le service NestJS :
  #   volumes:
  #     - uploads_data:/app/uploads
  # Sans ça, un restart du container efface tous les fichiers uploadés.
